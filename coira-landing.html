<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: #3B6D11; --green-mid: #639922; --orange: #BA7517;
    --bg: #111110; --bg2: #161614; --bg3: #1c1c1a;
    --border: #272725; --text: #e8e4dc; --muted: #888780; --faint: #444440;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

  nav {
    position: sticky; top: 0; z-index: 100;
    display: flex; justify-content: space-between; align-items: center;
    padding: 20px 48px;
    background: rgba(17,17,16,0.92); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo svg { width: 28px; height: 28px; }
  .nav-wordmark { font-size: 14px; font-weight: 600; letter-spacing: 4px; color: var(--text); }
  .nav-right { display: flex; align-items: center; gap: 24px; }
  .nav-links { display: flex; gap: 28px; list-style: none; }
  .nav-links a { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-decoration: none; text-transform: uppercase; transition: color 0.2s; }
  .nav-links a:hover { color: var(--text); }
  .nav-cta { color: var(--green-mid) !important; border: 1px solid var(--green); padding: 8px 16px; border-radius: 4px; transition: background 0.2s, color 0.2s !important; }
  .nav-cta:hover { background: var(--green) !important; color: #fff !important; }

  /* LANG SWITCHER */
  .lang-switcher { display: flex; gap: 4px; background: var(--bg2); border: 1px solid var(--border); border-radius: 6px; padding: 3px; }
  .lang-btn { font-size: 10px; font-weight: 500; letter-spacing: 1px; color: var(--muted); background: none; border: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: all 0.15s; font-family: 'Plus Jakarta Sans', sans-serif; }
  .lang-btn.active { background: var(--green); color: #fff; }
  .lang-btn:hover:not(.active) { color: var(--text); }

  .hero { padding: 96px 48px 80px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto; gap: 64px; align-items: center; max-width: 1100px; margin: 0 auto; }
  .hero-tag { font-size: 10px; letter-spacing: 3px; color: var(--green-mid); text-transform: uppercase; margin-bottom: 24px; }
  .hero-h1 { font-size: 52px; font-weight: 600; line-height: 1.1; color: var(--text); margin-bottom: 24px; }
  .hero-h1 em { font-style: italic; color: var(--green-mid); font-weight: 300; }
  .hero-sub { font-size: 15px; color: var(--muted); max-width: 440px; margin-bottom: 40px; line-height: 1.75; font-weight: 300; }
  .hero-actions { display: flex; gap: 16px; align-items: center; }
  .btn-primary { background: var(--green); color: #fff; font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 14px 28px; border-radius: 4px; text-decoration: none; transition: background 0.2s; font-family: 'Plus Jakarta Sans', sans-serif; }
  .btn-primary:hover { background: var(--green-mid); }
  .btn-secondary { font-size: 12px; color: var(--muted); text-decoration: none; letter-spacing: 1px; transition: color 0.2s; }
  .btn-secondary:hover { color: var(--text); }

  .hero-metrics { display: flex; flex-direction: column; background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; min-width: 200px; }
  .metric { padding: 24px 28px; border-bottom: 1px solid var(--border); }
  .metric:last-child { border-bottom: none; }
  .metric-num { font-size: 36px; font-weight: 600; color: var(--green-mid); line-height: 1; margin-bottom: 6px; }
  .metric-label { font-size: 10px; letter-spacing: 2px; color: var(--faint); text-transform: uppercase; }

  .services { padding: 80px 48px; border-bottom: 1px solid var(--border); max-width: 1100px; margin: 0 auto; }
  .section-header { display: flex; align-items: baseline; gap: 20px; margin-bottom: 48px; }
  .section-label { font-size: 10px; letter-spacing: 3px; color: var(--faint); text-transform: uppercase; }
  .section-line { flex: 1; height: 1px; background: var(--border); }
  .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: var(--border); border-radius: 8px; overflow: hidden; }
  .service-card { background: var(--bg2); padding: 36px 32px; transition: background 0.2s; }
  .service-card:hover { background: var(--bg3); }
  .service-accent { width: 24px; height: 2px; border-radius: 2px; margin-bottom: 20px; }
  .service-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 12px; }
  .service-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; font-weight: 300; }
  .service-items { list-style: none; display: flex; flex-direction: column; gap: 6px; }
  .service-items li { font-size: 12px; color: var(--faint); padding-left: 14px; position: relative; }
  .service-items li::before { content: '·'; position: absolute; left: 0; color: var(--green-mid); }

  .cases { padding: 80px 48px; border-bottom: 1px solid var(--border); max-width: 1100px; margin: 0 auto; }
  .cases-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .case-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 32px; position: relative; overflow: hidden; }
  .case-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--green); }
  .case-tag { font-size: 10px; letter-spacing: 2px; color: var(--green-mid); text-transform: uppercase; margin-bottom: 16px; }
  .case-title { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 12px; }
  .case-desc { font-size: 13px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; font-weight: 300; }
  .case-result { font-size: 11px; color: var(--orange); letter-spacing: 1px; }

  .contact { padding: 80px 48px; max-width: 1100px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: start; }
  .contact-h2 { font-size: 40px; font-weight: 600; color: var(--text); line-height: 1.15; margin-bottom: 16px; }
  .contact-h2 em { font-style: italic; color: var(--orange); font-weight: 300; }
  .contact-sub { font-size: 14px; color: var(--muted); line-height: 1.75; font-weight: 300; }

  .form { display: flex; flex-direction: column; gap: 16px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-field { display: flex; flex-direction: column; gap: 6px; }
  .form-field label { font-size: 10px; letter-spacing: 2px; color: var(--faint); text-transform: uppercase; }
  .form-field input, .form-field textarea {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
    padding: 12px 16px; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 13px;
    color: var(--text); outline: none; transition: border-color 0.2s; resize: none;
  }
  .form-field input:focus, .form-field textarea:focus { border-color: var(--green); }
  .form-field input::placeholder, .form-field textarea::placeholder { color: var(--faint); }
  .form-submit {
    background: var(--green); color: #fff; font-family: 'Plus Jakarta Sans', sans-serif;
    font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase;
    padding: 14px 28px; border: none; border-radius: 4px; cursor: pointer;
    transition: background 0.2s; align-self: flex-start;
  }
  .form-submit:hover { background: var(--green-mid); }
  .form-note { font-size: 11px; color: var(--faint); }
  .form-feedback { display: none; padding: 14px 16px; border-radius: 4px; font-size: 13px; }
  .form-feedback.success { display: block; background: rgba(59,109,17,0.15); border: 1px solid var(--green); color: var(--green-mid); }
  .form-feedback.error { display: block; background: rgba(186,117,23,0.15); border: 1px solid var(--orange); color: var(--orange); }

  footer { border-top: 1px solid var(--border); padding: 24px 48px; display: flex; justify-content: space-between; align-items: center; }
  .footer-logo { font-size: 11px; letter-spacing: 3px; color: var(--faint); }
  .footer-copy { font-size: 11px; color: var(--faint); }

  @media (max-width: 768px) {
    nav { padding: 16px 24px; }
    .nav-links { display: none; }
    .hero { grid-template-columns: 1fr; padding: 64px 24px 48px; gap: 40px; }
    .hero-h1 { font-size: 36px; }
    .services { padding: 60px 24px; }
    .services-grid { grid-template-columns: 1fr; }
    .cases { padding: 60px 24px; }
    .cases-grid { grid-template-columns: 1fr; }
    .contact { grid-template-columns: 1fr; padding: 60px 24px; gap: 48px; }
    .contact-h2 { font-size: 30px; }
    .form-row { grid-template-columns: 1fr; }
    footer { padding: 20px 24px; flex-direction: column; gap: 8px; text-align: center; }
  }
</style>
</head>

let currentLang = 'es';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent === lang.toUpperCase()));
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key] !== undefined) el.innerHTML = i18n[lang][key];
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.getAttribute('data-i18n-placeholder');
    if (i18n[lang][key] !== undefined) el.placeholder = i18n[lang][key];
  });
  document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang;
}

setLang('es');

const form = document.getElementById('contactForm');
const feedback = document.getElementById('formFeedback');
form.addEventListener('submit', async function(e) {
  e.preventDefault();
  const btn = form.querySelector('.form-submit');
  btn.textContent = '...';
  btn.disabled = true;
  try {
    const res = await fetch('https://formspree.io/f/xdawrwgq', {
      method: 'POST', body: new FormData(form),
      headers: { 'Accept': 'application/json' }
    });
    if (res.ok) {
      feedback.textContent = i18n[currentLang]['form.success'];
      feedback.className = 'form-feedback success';
      form.reset();
    } else { throw new Error(); }
  } catch {
    feedback.textContent = i18n[currentLang]['form.error'];
    feedback.className = 'form-feedback error';
  }
  btn.innerHTML = i18n[currentLang]['form.submit'];
  btn.disabled = false;
});
</script>
